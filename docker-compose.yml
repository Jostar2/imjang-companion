services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: imjang
      POSTGRES_USER: imjang
      POSTGRES_PASSWORD: imjang
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/imjang-uploads;
      /usr/bin/mc anonymous set private local/imjang-uploads;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      API_ENV: local
      DATABASE_URL: postgresql+psycopg://imjang:imjang@postgres:5432/imjang
      POSTGRES_DB: imjang
      POSTGRES_USER: imjang
      POSTGRES_PASSWORD: imjang
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: imjang-uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: ap-northeast-2
      WEB_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
